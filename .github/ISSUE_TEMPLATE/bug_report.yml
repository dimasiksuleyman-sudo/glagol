name: 🐛 Bug Report
description: Report a bug or unexpected behavior in Glagol / Сообщить об ошибке или неожиданном поведении
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.
        
        Спасибо, что нашли время сообщить о баге! Пожалуйста, заполните форму ниже.

  - type: textarea
    id: description
    attributes:
      label: Description / Описание
      description: A clear description of what the bug is. / Чёткое описание проблемы.
      placeholder: "When I try to synthesize a document, the app crashes... / Когда я пытаюсь озвучить документ, приложение падает..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce / Шаги воспроизведения
      description: How can we reproduce this bug? / Как воспроизвести баг?
      placeholder: |
        1. Open the app / Открыть приложение
        2. Click "Add document" / Нажать «Добавить документ»
        3. Select a PDF file / Выбрать PDF-файл
        4. Click "Synthesize" / Нажать «Озвучить»
        5. App crashes / Приложение падает
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / Ожидаемое поведение
      description: What did you expect to happen? / Что должно было произойти?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / Фактическое поведение
      description: What actually happened? / Что произошло на самом деле?
    validations:
      required: true

  - type: input
    id: glagol-version
    attributes:
      label: Glagol version / Версия Glagol
      description: Found in About menu / Можно посмотреть в меню "О программе"
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System / Операционная система
      options:
        - Windows 11
        - Windows 10
        - Other (specify below) / Другая (укажите ниже)
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version / Версия ОС
      description: e.g. Windows 11 23H2, build 22631.3007
      placeholder: "Windows 11 24H2"

  - type: dropdown
    id: file-format
    attributes:
      label: Document format (if relevant) / Формат документа (если применимо)
      options:
        - Plain text (.txt)
        - Markdown (.md)
        - Word (.docx)
        - PDF (.pdf)
        - Pasted text / Вставленный текст
        - Not applicable / Не применимо
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Логи
      description: |
        Application logs from `%LOCALAPPDATA%\Glagol\logs\` (remove any sensitive data first)
        Логи из `%LOCALAPPDATA%\Glagol\logs\` (удалите конфиденциальные данные перед отправкой)
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Скриншоты
      description: Drag and drop screenshots here / Перетащите скриншоты сюда

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks / Проверки перед отправкой
      options:
        - label: I have searched existing issues / Я проверил существующие issues
          required: true
        - label: I have removed any sensitive data (API keys, personal info) from logs and screenshots / Я удалил конфиденциальные данные из логов и скриншотов
          required: true
        - label: This is not a security vulnerability (those go via SECURITY.md) / Это не уязвимость безопасности (для них есть SECURITY.md)
          required: true
